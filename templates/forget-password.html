<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EvenUp — Forgot Password</title>

    <link rel="icon" type="image/svg+xml" href="/static/EvenUp-white.svg" />

    <link href="https://fonts.googleapis.com/css2?family=Xanh+Mono:ital@1&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050816;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Satoshi', sans-serif;
            position: relative;
        }

        .gradient {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.08) 0%,
                rgba(255, 255, 255, 0) 70%
            );
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 52px;
            margin-bottom: 1.8rem;
            opacity: 0.95;
            user-select: none;
            -webkit-user-drag: none;
        }

        h1 {
            font-family: 'Xanh Mono', monospace;
            font-style: italic;
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: -0.04em;
            margin-bottom: 0.6rem;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.875rem;
            letter-spacing: 0.04em;
            margin-bottom: 2.4rem;
            line-height: 1.6;
        }

        /* ── Form ── */
        .form-group {
            position: relative;
            margin-bottom: 0.85rem;
        }

        input[type="email"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            padding: 0.95rem 1.4rem;
            color: #f8fafc;
            font-family: 'Satoshi', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        input[type="email"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="email"]:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        input[type="email"].error-field {
            border-color: rgba(255, 100, 100, 0.5);
        }

        .submit-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            color: #050816;
            border: none;
            border-radius: 999px;
            padding: 0.95rem 1.4rem;
            font-family: 'Satoshi', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: #ffffff;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Spinner ── */
        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(5, 8, 22, 0.3);
            border-top-color: #050816;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Messages ── */
        .msg {
            font-size: 0.82rem;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
            display: none;
            text-align: left;
            line-height: 1.5;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg.error {
            background: rgba(255, 80, 80, 0.08);
            border: 1px solid rgba(255, 80, 80, 0.2);
            color: rgba(255, 160, 160, 0.9);
        }

        .msg.success {
            background: rgba(80, 220, 160, 0.07);
            border: 1px solid rgba(80, 220, 160, 0.2);
            color: rgba(120, 230, 185, 0.9);
        }

        /* ── Success State (full panel) ── */
        .success-panel {
            display: none;
            animation: fadeIn 0.35s ease;
        }

        .success-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(80, 220, 160, 0.3);
            background: rgba(80, 220, 160, 0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.4rem;
        }

        .success-icon svg {
            width: 22px;
            height: 22px;
            stroke: rgba(120, 230, 185, 0.9);
        }

        .success-panel h2 {
            font-family: 'Xanh Mono', monospace;
            font-style: italic;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 0.6rem;
        }

        .success-panel p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .success-panel p strong {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 500;
        }

        /* ── Back link ── */
        .back-link {
            display: inline-block;
            margin-top: 1.6rem;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.82rem;
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: rgba(255, 255, 255, 0.65);
        }

        /* ── Footer ── */
        .footer {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.04em;
            white-space: nowrap;
            z-index: 1;
        }

        *::selection {
            background: #ffffff;
            color: #050816;
        }

        @media (max-width: 480px) {
            .container { padding: 1.2rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>

<body>
    <div class="gradient"></div>

    <div class="container">
        <img src="/static/EvenUp-white.svg" alt="EvenUp" class="logo" />

        <div id="formPanel">
            <h1>Forgot password?</h1>
            <p class="subtitle">Enter your email and we'll send you a reset link.</p>

            <div class="form-group">
                <input
                    type="email"
                    id="emailInput"
                    placeholder="you@example.com"
                    autocomplete="email"
                    autofocus
                />
            </div>

            <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
                <span id="btnText">Send reset link</span>
                <span class="spinner" id="spinner"></span>
            </button>

            <div class="msg error" id="errorMsg"></div>

            <a href="/" class="back-link">← Back to home</a>
        </div>


        <div class="success-panel" id="successPanel">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h2>Check your email</h2>
            <p>
                A password reset link has been sent to
                <br />
                <strong id="sentToEmail"></strong>
            </p>

            <p style="font-size:0.8rem; color: rgba(255,255,255,0.3);">
                You can safely close this page now.
            </p>
            <a href="/" class="back-link">← Back to home</a>
        </div>
    </div>

    <div class="footer">FastAPI • EvenUp Backend • v0.0.1</div>

    <script>

        async function handleSubmit() {
            const emailInput = document.getElementById('emailInput');
            const submitBtn  = document.getElementById('submitBtn');
            const spinner    = document.getElementById('spinner');
            const btnText    = document.getElementById('btnText');
            const errorMsg   = document.getElementById('errorMsg');

            const email = emailInput.value.trim();

            // Basic client-side validation
            if (!email) {
                showError('Please enter your email address.');
                emailInput.classList.add('error-field');
                emailInput.focus();
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('That doesn\'t look like a valid email address.');
                emailInput.classList.add('error-field');
                emailInput.focus();
                return;
            }

            // Clear previous errors
            errorMsg.style.display = 'none';
            emailInput.classList.remove('error-field');
            

            // Loading state
            setLoading(true);

            try {
                const res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                const data = await res.json().catch(() => ({}));

            if (res.ok && data.success) {
                showSuccess(email);
            } else {
                const detail = data?.detail || data?.message || null;

                if (res.status === 404) {
                    showError('No account found with that email address.');
                    emailInput.classList.add('error-field');
                } else if (res.status === 400) {
                    showError(detail || 'This account cannot reset its password.');
                    emailInput.classList.add('error-field');
                } else if (res.status === 429) {
                    showError('Too many requests. Please wait a moment and try again.');
                } else {
                    showError(detail || 'Something went wrong. Please try again.');
                }
            }
            } catch (err) {
                showError('Unable to reach the server. Check your connection and try again.');
            } finally {
                setLoading(false);
            }
        }

        function showSuccess(email) {
            document.getElementById('sentToEmail').textContent = email;
            document.getElementById('formPanel').style.display = 'none';
            const panel = document.getElementById('successPanel');
            panel.style.display = 'block';
        }


        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            el.className = 'msg error';
        }

        function setLoading(loading) {
            const btn     = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            btn.disabled = loading;
            spinner.style.display = loading ? 'block' : 'none';
            btnText.textContent    = loading ? 'Sending…' : 'Send reset link';
        }

        // Allow Enter key to submit
        document.getElementById('emailInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSubmit();
        });

        // Clear error styling on input
        document.getElementById('emailInput').addEventListener('input', () => {
            document.getElementById('emailInput').classList.remove('error-field');
            document.getElementById('errorMsg').style.display = 'none';
        });
    </script>
</body>
</html>
